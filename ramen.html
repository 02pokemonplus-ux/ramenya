<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拉麵店單字學習工具</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --olive: #B23A2E;
    --olive-deep: #8F2E24;
    --bg: #FBF3EC;
    --card: #FFFFFF;
    --card-alt: #F4E6DA;
    --line: #ECDFD0;
    --ink: #2B2520;
    --ink-soft: #786C5E;
    --muted: #A89A87;
    --accent: #B23A2E;
    --accent-soft: #F0D8CA;
    --on-accent: #FBF3EC;
    --r-sm: 10px;
    --r-md: 16px;
    --r-lg: 22px;
    --r-pill: 999px;
  }

  html[data-theme="dark"] {
    --olive: #D9836F;
    --olive-deep: #B5654F;
    --bg: #1C1B1A;
    --card: #262423;
    --card-alt: #302E2C;
    --line: #3F3D3A;
    --ink: #D9D5D0;
    --ink-soft: #A8A39C;
    --muted: #7A766F;
    --accent: #D9836F;
    --accent-soft: #4A372F;
    --on-accent: #ECE2D6;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: "Noto Sans TC", "Noto Sans JP", sans-serif;
    min-height: 100vh;
    transition: background 0.25s ease, color 0.25s ease;
  }

  /* ---------- Header ---------- */
  .topbar {
    background: var(--olive);
    color: var(--on-accent);
    padding: 16px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .topbar-left { display: flex; align-items: baseline; gap: 10px; }

  .topbar-title {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  .topbar-sub {
    font-size: 12px;
    color: rgba(251,243,236,0.65);
    letter-spacing: 0.02em;
  }

  .topbar-right { display: flex; align-items: center; gap: 14px; }

  .theme-toggle {
    width: 36px;
    height: 36px;
    border-radius: var(--r-pill);
    border: 1px solid rgba(251,243,236,0.25);
    background: rgba(251,243,236,0.08);
    color: #FBF3EC;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s ease, border-color 0.2s ease;
  }
  .theme-toggle:hover {
    background: rgba(251,243,236,0.16);
    border-color: rgba(251,243,236,0.4);
  }
  .theme-toggle svg { width: 17px; height: 17px; }

  /* ---------- Tab nav ---------- */
  .tabbar {
    background: var(--card);
    border-bottom: 1px solid var(--line);
    display: flex;
    overflow-x: auto;
  }

  .tab-item {
    flex: 1;
    text-align: center;
    padding: 16px 10px;
    font-size: 14px;
    color: var(--ink-soft);
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    transition: color 0.15s ease, border-color 0.15s ease;
    user-select: none;
  }
  .tab-item:hover { color: var(--ink); }
  .tab-item.active {
    color: var(--ink);
    font-weight: 700;
    border-bottom-color: var(--olive);
  }

  .subtabbar {
    background: var(--bg);
    border-bottom: 1px solid var(--line);
    display: flex;
    overflow-x: auto;
    padding: 0 12px;
  }
  .subtab-item {
    padding: 11px 16px;
    font-size: 13px;
    color: var(--ink-soft);
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    user-select: none;
  }
  .subtab-item:hover { color: var(--ink); }
  .subtab-item.active {
    color: var(--olive);
    font-weight: 700;
    border-bottom-color: var(--olive);
  }

  /* ---------- Inner tab ---------- */
  .inner-tabbar {
    display: inline-flex;
    gap: 4px;
    background: var(--card-alt);
    border-radius: var(--r-pill);
    padding: 4px;
    margin-bottom: 22px;
  }
  .inner-tab-item {
    padding: 8px 20px;
    border-radius: var(--r-pill);
    font-size: 13px;
    color: var(--ink-soft);
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .inner-tab-item:hover { color: var(--ink); }
  .inner-tab-item.active {
    background: var(--olive);
    color: var(--on-accent);
    font-weight: 700;
  }

  .inner-view { display: none; }
  .inner-view.active { display: block; }

  /* ---------- Main ---------- */
  .main {
    max-width: 1180px;
    margin: 0 auto;
    padding: 22px 24px 80px;
  }

  .section-label {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 14px;
  }

  /* ---------- View switching ---------- */
  .view { display: none; }
  .view.active { display: block; }

  /* ====== STUDY (flashcard) view ====== */
  .study-layout {
    max-width: 560px;
    margin: 0 auto;
  }

  .card-panel {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    padding: 48px 40px;
    min-height: 280px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    cursor: pointer;
    position: relative;
  }

  .card-index-tag {
    position: absolute;
    top: 20px;
    left: 22px;
    font-size: 12px;
    color: var(--muted);
  }

  .card-kanji {
    font-size: 40px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 10px;
    line-height: 1.3;
  }

  .card-kana {
    font-size: 16px;
    color: var(--ink-soft);
    margin-bottom: 18px;
  }

  .card-zh {
    font-size: 24px;
    font-weight: 700;
    color: var(--olive);
    min-height: 30px;
  }

  .card-hint {
    margin-top: 22px;
    font-size: 12px;
    color: var(--muted);
  }

  .card-nav-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-top: 18px;
  }

  .nav-btn {
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink-soft);
    width: 38px;
    height: 38px;
    border-radius: var(--r-pill);
    cursor: pointer;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .nav-btn:hover { border-color: var(--olive); color: var(--olive); }

  .nav-counter {
    font-size: 13px;
    color: var(--muted);
    min-width: 56px;
    text-align: center;
  }

  .shuffle-btn {
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink-soft);
    padding: 0 18px;
    height: 38px;
    border-radius: var(--r-pill);
    cursor: pointer;
    font-size: 13px;
  }
  .shuffle-btn:hover { border-color: var(--olive); color: var(--olive); }

  /* ====== Reference table view ====== */
  .ref-toolbar-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 14px;
  }
  .ref-toolbar-row .section-label {
    margin-bottom: 0;
  }

  .phrase-toggle-btn {
    padding: 7px 16px;
    border-radius: var(--r-pill);
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink-soft);
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    flex-shrink: 0;
  }
  .phrase-toggle-btn:hover { border-color: var(--olive); color: var(--ink); }
  .phrase-toggle-btn[data-on="true"] {
    background: var(--olive);
    border-color: var(--olive);
    color: var(--on-accent);
    font-weight: 700;
  }

  .meat-filter-row {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .meat-filter-item {
    padding: 9px 20px;
    border-radius: var(--r-pill);
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink-soft);
    font-size: 13px;
    cursor: pointer;
    user-select: none;
  }
  .meat-filter-item:hover { border-color: var(--olive); color: var(--ink); }
  .meat-filter-item.active {
    background: var(--olive);
    border-color: var(--olive);
    color: var(--on-accent);
    font-weight: 700;
  }

  .ref-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .ref-cell {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 16px 20px;
    min-height: 56px;
    font-size: 15px;
    color: var(--ink);
    cursor: pointer;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    transition: background 0.15s ease, border-color 0.15s ease;
  }
  .ref-cell:hover { border-color: var(--olive); }
  .ref-cell-kanji { font-weight: 700; }
  .ref-cell.revealed {
    background: var(--card-alt);
    border-color: var(--olive);
  }
  .ref-cell-kana { font-size: 13px; color: var(--ink-soft); }
  .ref-cell-zh { font-size: 16px; font-weight: 700; color: var(--ink); }

  /* 中文常駐模式：取消點擊互動感，卡片永遠顯示假名＋中文 */
  .ref-grid.zh-pinned .ref-cell {
    cursor: default;
  }
  .ref-grid.zh-pinned .ref-cell:hover {
    border-color: var(--line);
  }

  /* ====== Quiz view ====== */
  .quiz-wrap { max-width: 560px; margin: 0 auto; }

  .quiz-panel {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 40px 32px;
    text-align: center;
    margin-bottom: 22px;
  }
  .quiz-question-label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .quiz-kanji { font-size: 32px; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
  .quiz-kana { font-size: 14px; color: var(--ink-soft); }

  .quiz-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .quiz-option {
    padding: 16px 12px;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink);
    font-size: 14px;
    border-radius: var(--r-md);
    cursor: pointer;
    font-family: inherit;
  }
  .quiz-option:hover:not(:disabled) { border-color: var(--olive); }
  .quiz-option.correct { background: #E7EFD9; border-color: #6B8E4E; color: #3F5A2C; }
  .quiz-option.wrong { background: #F3E0D9; border-color: #B5573A; color: #7A3A26; }
  .quiz-option:disabled { cursor: default; }

  .quiz-feedback {
    text-align: center;
    margin-top: 16px;
    font-size: 13px;
    color: var(--olive);
    min-height: 18px;
  }

  .quiz-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 20px;
  }
  .quiz-score { font-size: 13px; color: var(--ink-soft); }
  .quiz-score strong { color: var(--olive); }

  .next-btn {
    padding: 9px 22px;
    border-radius: var(--r-pill);
    background: var(--olive);
    color: var(--on-accent);
    border: none;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  .next-btn:disabled { opacity: 0.35; cursor: default; }

  .quiz-result { text-align: center; padding: 50px 30px; }
  .quiz-result .big-score { font-size: 46px; font-weight: 700; color: var(--olive); margin-bottom: 8px; }
  .quiz-result .result-msg { color: var(--ink-soft); font-size: 14px; margin-bottom: 22px; }
  .restart-btn {
    padding: 10px 28px;
    border-radius: var(--r-pill);
    background: var(--olive);
    color: var(--on-accent);
    border: none;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }

  /* ====== Confusables view ====== */
  .confuse-row {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 18px 22px;
    margin-bottom: 12px;
  }
  .confuse-title { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
  .confuse-items { display: flex; gap: 12px; flex-wrap: wrap; }
  .confuse-pill {
    background: var(--card-alt);
    border: 1px solid var(--line);
    border-radius: var(--r-pill);
    padding: 10px 18px;
    font-size: 14px;
  }
  .confuse-pill .k { font-weight: 700; color: var(--ink); }
  .confuse-pill .z { font-size: 12px; color: var(--muted); margin-left: 6px; }

  /* ====== Phrase view ====== */
  .phrase-toolbar {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 4px;
  }
  .phrase-toggle-group {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  .phrase-toggle-btn {
    padding: 7px 16px;
    border-radius: var(--r-pill);
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink-soft);
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
  }
  .phrase-toggle-btn:hover { border-color: var(--olive); color: var(--ink); }
  .phrase-toggle-btn[data-on="true"] {
    background: var(--olive);
    border-color: var(--olive);
    color: var(--on-accent);
    font-weight: 700;
  }

  .scene-tabbar {
    display: flex;
    gap: 8px;
    margin: 0 auto 16px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 680px;
  }
  .scene-tab-item {
    padding: 9px 20px;
    border-radius: var(--r-pill);
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink-soft);
    font-size: 13px;
    cursor: pointer;
    user-select: none;
  }
  .scene-tab-item:hover { border-color: var(--olive); color: var(--ink); }
  .scene-tab-item.active {
    background: var(--olive);
    border-color: var(--olive);
    color: var(--on-accent);
    font-weight: 700;
  }

  .scenario-tabbar {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin: 0 auto 24px;
    max-width: 680px;
  }
  .scenario-tab-item {
    padding: 9px 14px;
    border-radius: var(--r-pill);
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink-soft);
    font-size: 13px;
    cursor: pointer;
    user-select: none;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .scenario-tab-item:hover { border-color: var(--olive); color: var(--ink); }
  .scenario-tab-item.active {
    background: var(--olive);
    border-color: var(--olive);
    color: var(--on-accent);
    font-weight: 700;
  }

  .play-all-row {
    display: flex;
    justify-content: center;
    margin: 0 auto 18px;
    max-width: 680px;
  }
  .play-all-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 22px;
    border-radius: var(--r-pill);
    border: 1px solid var(--olive);
    background: var(--card);
    color: var(--olive);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .play-all-btn:hover { background: var(--accent-soft); }
  .play-all-btn.active {
    background: var(--olive);
    color: var(--on-accent);
  }
  .play-all-btn svg { width: 14px; height: 14px; }

  .phrase-row.speaking .phrase-bubble {
    border-color: var(--olive);
    box-shadow: 0 0 0 2px var(--accent-soft);
  }

  .phrase-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 680px;
    margin: 0 auto;
  }

  .phrase-row {
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .phrase-row.staff { justify-content: flex-start; }
  .phrase-row.customer { justify-content: flex-end; }

  .speaker-tag {
    flex-shrink: 0;
    width: 52px;
    text-align: center;
    font-size: 11px;
    padding: 4px 0;
    border-radius: var(--r-pill);
    font-weight: 700;
    margin-top: 4px;
  }
  .phrase-row.staff .speaker-tag {
    background: var(--accent-soft);
    color: var(--olive);
  }
  .phrase-row.customer .speaker-tag {
    background: var(--card-alt);
    color: var(--ink-soft);
    order: 2;
  }

  .phrase-bubble {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 14px 18px;
    max-width: 480px;
  }
  .phrase-row.staff .phrase-bubble {
    border-top-left-radius: 4px;
  }
  .phrase-row.customer .phrase-bubble {
    border-top-right-radius: 4px;
    background: var(--card-alt);
  }

  .phrase-jp-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 4px;
  }

  .phrase-jp {
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.6;
  }

  .phrase-jp .furi {
    position: relative;
    cursor: help;
    border-bottom: 1px dashed var(--line);
  }

  .phrase-jp .furi::after {
    content: attr(data-kana);
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%) translateY(4px);
    margin-bottom: 6px;
    background: var(--olive);
    color: var(--on-accent);
    font-size: 11px;
    font-weight: 500;
    padding: 4px 9px;
    border-radius: var(--r-sm);
    white-space: nowrap;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.15s ease, transform 0.15s ease;
    pointer-events: none;
    z-index: 5;
  }
  .phrase-jp .furi:hover::after,
  .phrase-jp .furi.show-tooltip::after {
    opacity: 1;
    visibility: visible;
    transform: translateX(-50%) translateY(0);
  }

  .speak-btn {
    flex-shrink: 0;
    width: 26px;
    height: 26px;
    border-radius: var(--r-pill);
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink-soft);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
    transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
  }
  .speak-btn:hover { border-color: var(--olive); color: var(--olive); }
  .speak-btn.playing { background: var(--olive); border-color: var(--olive); color: var(--on-accent); }
  .speak-btn svg { width: 13px; height: 13px; }

  .phrase-zh { font-size: 13px; color: var(--ink-soft); display: none; }

  body.show-zh .phrase-zh { display: block; }

  @media (max-width: 860px) {
    .quiz-options { grid-template-columns: 1fr; }
    .ref-grid { grid-template-columns: 1fr; }
  }

  :focus-visible { outline: 2px solid var(--olive); outline-offset: 2px; }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <span class="topbar-title">拉麵店單字學習工具</span>
  </div>
  <div class="topbar-right">
    <span class="topbar-sub">速查 ・ 單字卡 ・ 測驗 ・ 易混淆點</span>
    <button class="theme-toggle" id="themeToggle" title="切換晝夜模式" aria-label="切換晝夜模式">
      <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4.5"></circle>
        <line x1="12" y1="2.5" x2="12" y2="5"></line>
        <line x1="12" y1="19" x2="12" y2="21.5"></line>
        <line x1="4.2" y1="4.2" x2="6" y2="6"></line>
        <line x1="18" y1="18" x2="19.8" y2="19.8"></line>
        <line x1="2.5" y1="12" x2="5" y2="12"></line>
        <line x1="19" y1="12" x2="21.5" y2="12"></line>
        <line x1="4.2" y1="19.8" x2="6" y2="18"></line>
        <line x1="18" y1="6" x2="19.8" y2="4.2"></line>
      </svg>
    </button>
  </div>
</header>

<nav class="tabbar" id="modeTabbar">
  <div class="tab-item active" data-mode="ref">速查表</div>

function buildFuriganaHTML(text) {
  let result = '';
  let i = 0;
  while (i < text.length) {
    let matched = false;
    for (const [word, kana] of KANJI_READINGS) {
      if (text.startsWith(word, i) && /[\u4E00-\u9FFF]/.test(word)) {
        result += `<span class="furi" data-kana="${kana}">${word}</span>`;
        i += word.length;
        matched = true;
        break;
      }
    }
    if (!matched) {
      result += text[i];
      i += 1;
    }
  }
  return result;
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function refreshCatTabbarVisibility() {
  const needsCat = (currentMode === 'ref' && refSubMode === 'lookup') ||
                    (currentMode === 'study' && (studySubMode === 'memorize' || studySubMode === 'quiz'));
  document.getElementById('catTabbar').style.display = needsCat ? 'flex' : 'none';
}

/* ---------- top-level mode tabs ---------- */
document.querySelectorAll('#modeTabbar .tab-item').forEach(tab => {
  tab.addEventListener('click', () => {
    stopPlayAll();
    document.querySelectorAll('#modeTabbar .tab-item').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentMode = tab.dataset.mode;
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + currentMode).classList.add('active');

    refreshCatTabbarVisibility();
    enterCurrentMode();
  });
});

/* ---------- inner sub-mode tabs ---------- */
document.getElementById('refInnerTabbar').addEventListener('click', (e) => {
  const item = e.target.closest('.inner-tab-item');
  if (!item) return;
  document.querySelectorAll('#refInnerTabbar .inner-tab-item').forEach(t => t.classList.remove('active'));
  item.classList.add('active');
  refSubMode = item.dataset.submode;
  document.querySelectorAll('#view-ref .inner-view').forEach(v => v.classList.remove('active'));
  document.getElementById('ref-' + refSubMode).classList.add('active');
  refreshCatTabbarVisibility();
  enterCurrentMode();
});

document.getElementById('studyInnerTabbar').addEventListener('click', (e) => {
  const item = e.target.closest('.inner-tab-item');
  if (!item) return;
  document.querySelectorAll('#studyInnerTabbar .inner-tab-item').forEach(t => t.classList.remove('active'));
  item.classList.add('active');
  studySubMode = item.dataset.submode;
  document.querySelectorAll('#view-study .inner-view').forEach(v => v.classList.remove('active'));
  document.getElementById('study-' + studySubMode).classList.add('active');
  refreshCatTabbarVisibility();
  enterCurrentMode();
});

/* ---------- dispatch ---------- */
function enterCurrentMode() {
  if (currentMode === 'ref') {
    if (refSubMode === 'lookup') renderRef();
    if (refSubMode === 'confuse') renderConfuse();
  } else if (currentMode === 'study') {
    if (studySubMode === 'memorize') initStudy();
    if (studySubMode === 'quiz') initQuiz();
  } else if (currentMode === 'phrase') {
    renderPhrase();
  }
}

/* ---------- category sub-tabs ---------- */
function buildCatTabs() {
  const bar = document.getElementById('catTabbar');
  bar.innerHTML = '';
  CAT_KEYS.forEach(key => {
    const cat = VOCAB_DATA[key];
    const el = document.createElement('div');
    el.className = 'subtab-item' + (key === currentCat ? ' active' : '');
    el.textContent = cat.label;
    el.addEventListener('click', () => {
      currentCat = key;
      buildCatTabs();
      enterCurrentMode();
    });
    bar.appendChild(el);
  });
}

function getRefItems() {
  const cat = VOCAB_DATA[currentCat];
  if (currentMeatFilter === "all") return cat.items;
  return cat.items.filter(it => it.meat === currentMeatFilter);
}

function renderMeatFilter() {
  const cat = VOCAB_DATA[currentCat];
  const row = document.getElementById('meatFilterRow');
  const meatsPresent = [...new Set(cat.items.filter(it => it.meat).map(it => it.meat))];

  if (meatsPresent.length === 0) {
    row.style.display = 'none';
    row.innerHTML = '';
    return;
  }

  row.style.display = 'flex';
  row.innerHTML = '';
  const options = ["all", ...meatsPresent];
  options.forEach(key => {
    const pill = document.createElement('div');
    pill.className = 'meat-filter-item' + (key === currentMeatFilter ? ' active' : '');
    pill.textContent = MEAT_LABELS[key] || key;
    pill.addEventListener('click', () => {
      currentMeatFilter = key;
      renderMeatFilter();
      renderRef(true);
    });
    row.appendChild(pill);
  });
}

function renderRefCell(cell, item) {
  if (refZhPinned) {
    cell.classList.add('revealed');
    cell.innerHTML = `<span class="ref-cell-kanji">${item.kanji}</span><span class="ref-cell-kana">${item.kana}</span><span class="ref-cell-zh">${item.zh}</span>`;
  } else {
    cell.classList.remove('revealed');
    cell.innerHTML = `<span class="ref-cell-kanji">${item.kanji}</span>`;
  }
}

function renderRef(keepFilter) {
  if (!keepFilter) currentMeatFilter = "all";
  renderMeatFilter();

  const items = getRefItems();
  const grid = document.getElementById('refGrid');
  grid.classList.toggle('zh-pinned', refZhPinned);
  grid.innerHTML = '';
  items.forEach((item) => {
    const cell = document.createElement('div');
    cell.className = 'ref-cell';
    renderRefCell(cell, item);
    cell.addEventListener('click', () => {
      if (refZhPinned) return; // 全顯示模式下不需要點擊翻牌
      const revealed = cell.classList.toggle('revealed');
      cell.innerHTML = revealed
        ? `<span class="ref-cell-kana">${item.kana}</span><span class="ref-cell-zh">${item.zh}</span>`
        : `<span class="ref-cell-kanji">${item.kanji}</span>`;
    });
    grid.appendChild(cell);
  });
}

document.getElementById('toggleRefZh').addEventListener('click', (e) => {
  const isOn = e.target.dataset.on === 'true';
  refZhPinned = !isOn;
  e.target.dataset.on = String(refZhPinned);
  document.getElementById('refLookupHint').textContent = refZhPinned
    ? '已顯示全部假名與中文意思'
    : '點擊單字查看假名與中文意思';
  renderRef(true);
});

  isFlipped = false;

}

function renderStudyCard() {

document.getElementById('flashcard').addEventListener('click', () => {

/* ================= QUIZ ================= */
function initQuiz() {
  const cat = VOCAB_DATA[currentCat];
  quizQueue = shuffle(cat.items.map((_, i) => i));
  quizIndex = 0;
  quizScore = 0;
  quizAnswered = false;
  document.getElementById('quizContent').style.display = 'block';
  document.getElementById('quizResultView').style.display = 'none';
  renderQuizQuestion();
}

function renderQuizQuestion() {
  const cat = VOCAB_DATA[currentCat];
  const itemIdx = quizQueue[quizIndex];
  const item = cat.items[itemIdx];
  quizAnswered = false;

  document.getElementById('quizKanji').textContent = item.kanji;
  document.getElementById('quizKana').textContent = item.kana;
  document.getElementById('quizFeedback').textContent = '';
  document.getElementById('nextQuestionBtn').disabled = true;

  const pool = cat.items.filter((_, i) => i !== itemIdx).map(x => x.zh);
  const wrongs = shuffle(pool).slice(0, 3);
  const options = shuffle([item.zh, ...wrongs]);

  const optWrap = document.getElementById('quizOptions');
  optWrap.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quiz-option';
    btn.textContent = opt;
    btn.addEventListener('click', () => handleAnswer(btn, opt, item.zh));
    optWrap.appendChild(btn);
  });

  document.getElementById('scoreText').textContent = `${quizScore} / ${quizIndex}`;
}

function handleAnswer(btn, chosen, correct) {
  if (quizAnswered) return;
  quizAnswered = true;
  document.querySelectorAll('.quiz-option').forEach(b => b.disabled = true);

  if (chosen === correct) {
    btn.classList.add('correct');
    quizScore++;
    document.getElementById('quizFeedback').textContent = '答對了';
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.quiz-option').forEach(b => { if (b.textContent === correct) b.classList.add('correct'); });
    document.getElementById('quizFeedback').textContent = `正確答案：${correct}`;
  }
  document.getElementById('scoreText').textContent = `${quizScore} / ${quizIndex + 1}`;
  document.getElementById('nextQuestionBtn').disabled = false;
}

document.getElementById('nextQuestionBtn').addEventListener('click', () => {
  quizIndex++;
  if (quizIndex >= quizQueue.length) {
    showQuizResult();
  } else {
    renderQuizQuestion();
  }
});

function showQuizResult() {
  document.getElementById('quizContent').style.display = 'none';
  document.getElementById('quizResultView').style.display = 'block';
  const total = quizQueue.length;
  document.getElementById('finalScore').textContent = `${quizScore} / ${total}`;
  let msg = '繼續加油，多複習幾次吧';
  const ratio = quizScore / total;
  if (ratio === 1) msg = '完美，這個分類已經記熟了';
  else if (ratio >= 0.8) msg = '很不錯，幾乎全對';
  else if (ratio >= 0.5) msg = '還可以，再複習一輪會更熟練';
  document.getElementById('resultMsg').textContent = msg;
}

document.getElementById('restartBtn').addEventListener('click', initQuiz);

// 依說話者給予不同音調與速度，讓店員／客人聲音明顯不同
// staff: 男性聲音、稍低沉、語速正常；customer: 女性聲音、稍高、語速正常
const VOICE_PROFILE = {
  staff:    { pitch: 0.95, rate: 0.97 },
  customer: { pitch: 1.08, rate: 1.0 },
};

let jaVoices = [];
function loadJaVoices() {
  if (!('speechSynthesis' in window)) return;
  const all = window.speechSynthesis.getVoices();
  jaVoices = all.filter(v => v.lang && v.lang.toLowerCase().startsWith('ja'));
}
if ('speechSynthesis' in window) {
  loadJaVoices();
  window.speechSynthesis.onvoiceschanged = loadJaVoices;
}

function pickJaVoice(speaker) {
  if (jaVoices.length === 0) return null;
  if (jaVoices.length === 1) return jaVoices[0];
  // 常見日文男聲/女聲語音名稱線索（不同瀏覽器/系統命名不同，盡量覆蓋常見情況）
  const maleHints = ['male', 'man', 'otoko', '男', 'otoya', 'ichiro', 'kenji', 'hattori', 'sora'];
  const femaleHints = ['female', 'woman', 'onna', '女', 'kyoko', 'o-ren', 'haruka', 'ayumi', 'sayaka', 'nanami', 'mei'];
  const lowerNamed = v => v.name.toLowerCase();
  const males = jaVoices.filter(v => maleHints.some(h => lowerNamed(v).includes(h)));
  const females = jaVoices.filter(v => femaleHints.some(h => lowerNamed(v).includes(h)));
  if (speaker === 'staff' && males.length) return males[0];
  if (speaker === 'customer' && females.length) return females[0];
  // 找不到明確性別線索時，店員固定用第一個語音，客人固定用第二個（若有），
  // 確保兩者語音來源不同，而不是只靠 pitch 強行扭曲同一語音
  if (jaVoices.length >= 2) {
    return speaker === 'staff' ? jaVoices[0] : jaVoices[1];
  }
  return jaVoices[0];
}

function speakJapanese(text, btn, speaker, onEnd) {
  if (!('speechSynthesis' in window)) {
    alert('您的瀏覽器不支援語音播放功能');
    if (onEnd) onEnd();
    return;
  }
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ja-JP';
  const profile = VOICE_PROFILE[speaker] || { pitch: 1, rate: 0.95 };
  utter.pitch = profile.pitch;
  utter.rate = profile.rate;
  const voice = pickJaVoice(speaker);
  if (voice) utter.voice = voice;

  if (btn) {
    document.querySelectorAll('.speak-btn.playing').forEach(b => b.classList.remove('playing'));
    btn.classList.add('playing');
  }
  const finish = () => {
    if (btn) btn.classList.remove('playing');
    if (onEnd) onEnd();
  };
  utter.onend = finish;
  utter.onerror = finish;

  window.speechSynthesis.speak(utter);
}

/* ---------- 全部播放（依序播放當前情境所有例句） ---------- */
let playAllActive = false;
let playAllQueue = [];
let playAllIdx = 0;

function stopPlayAll() {
  playAllActive = false;
  playAllQueue = [];
  playAllIdx = 0;
  if ('speechSynthesis' in window) window.speechSynthesis.cancel();
  document.querySelectorAll('.phrase-row.speaking').forEach(r => r.classList.remove('speaking'));
  document.querySelectorAll('.speak-btn.playing').forEach(b => b.classList.remove('playing'));
  const btn = document.getElementById('playAllBtn');
  const label = document.getElementById('playAllLabel');
  if (btn) btn.classList.remove('active');
  if (label) label.textContent = '全部播放';
}

function playAllNext() {
  if (!playAllActive) return;
  if (playAllIdx >= playAllQueue.length) {
    stopPlayAll();
    return;
  }
  const { row, item } = playAllQueue[playAllIdx];
  document.querySelectorAll('.phrase-row.speaking').forEach(r => r.classList.remove('speaking'));
  row.classList.add('speaking');
  row.scrollIntoView({ behavior: 'smooth', block: 'center' });
  const speakBtn = row.querySelector('.speak-btn');
  speakJapanese(item.jp, speakBtn, item.speaker, () => {
    playAllIdx++;
    playAllNext();
  });
}

function startPlayAll() {
  const rows = Array.from(document.querySelectorAll('#phraseList .phrase-row'));
  const scene = PHRASE_DATA[currentPhraseScene];
  const scenario = scene.scenarios[currentScenarioIndex];
  playAllQueue = rows.map((row, i) => ({ row, item: scenario.items[i] }));
  playAllIdx = 0;
  playAllActive = true;
  const btn = document.getElementById('playAllBtn');
  const label = document.getElementById('playAllLabel');
  if (btn) btn.classList.add('active');
  if (label) label.textContent = '停止播放';
  playAllNext();
}

document.getElementById('playAllBtn').addEventListener('click', () => {
  if (playAllActive) {
    stopPlayAll();
  } else {
    startPlayAll();
  }
});

function renderPhrase() {
  buildSceneTabs();
  buildScenarioTabs();
  renderPhraseList();
}
